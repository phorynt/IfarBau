<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referenciák – Ifár-Bau Kft.</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header>
    <div class="container nav-inner">
        <a href="index.html" class="logo home-icon">
            <i class="fa-solid fa-house"></i>
        </a>

        <nav>
            <ul>
                <li><a href="index.html">Főoldal</a></li>
                <li><a href="szolgaltatasok.html">Szolgáltatások</a></li>
                <li><a href="rolunk.html">Rólunk</a></li>
                <li><a href="referenciak.html" class="active">Referenciák</a></li>
                <li><a href="kapcsolat.html">Kapcsolat</a></li>
            </ul>
        </nav>

        <div class="nav-phone">+36 30 475 2917</div>

        <div class="mobile-menu-btn">
            <i class="fa-solid fa-bars"></i>
        </div>
    </div>
</header>

<main>

    <!-- HERO -->
    <section class="hero" style="background-image:url('Images/Hero/referencia-hero.jpg');">
        <div class="container hero-content">
            <h1>Referenciák</h1>
            <p>Tekintse meg korábbi munkáinkat, amelyekre büszkék vagyunk.</p>
        </div>
    </section>

    <!-- GALÉRIA -->
    <section class="services">
        <div class="container">
            <h2 class="section-title">Munkáink</h2>

            <div class="gallery-grid" id="gallery"></div>
        </div>
    </section>

</main>

<!-- KAPCSOLAT SÁV -->
<section class="stats">
    <div class="container" style="text-align:center;">
        <p style="margin-bottom:1rem;">Szeretne hasonló minőségű munkát?</p>
        <a href="kapcsolat.html" class="btn btn-primary">Vegye fel velünk a kapcsolatot</a>
    </div>
</section>

<footer>
    © <span id="year"></span> Ifár-Bau Kft.
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

// Mobil menü
const menuBtn = document.querySelector('.mobile-menu-btn');
const navMenu = document.querySelector('nav ul');
menuBtn.addEventListener('click', () => navMenu.classList.toggle('show'));

// ------------------------------
// AUTOMATIKUS KÉPBETÖLTÉS (GYORS, VILLANÁSMENTES)
// ------------------------------

// Ezt az egy számot kell átírnod, ha új képet raksz be:
let totalImages = 10;  // <<< IDE ÍROD BE, HÁNY KÉP VAN

const folder = "Images/Reference/";
const extensions = ["jpg", "jpeg", "png", "webp", "JPG", "JPEG", "PNG", "WEBP"];
const gallery = document.getElementById("gallery");

for (let i = 1; i <= totalImages; i++) {
    let img = document.createElement("img");
    img.alt = "Referencia kép";

    let index = 0;

    function tryNext() {
        if (index >= extensions.length) return;
        img.src = folder + i + "." + extensions[index++];
        img.onerror = tryNext;
    }

    tryNext();
    gallery.appendChild(img);
}
</script>

</body>
</html>
